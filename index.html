<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Converter</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script>
        // Simple password protection for Fiverr demos
        const PASSWORD = "demo2024";
        const userPass = prompt("🔒 Demo Access\n\nContact taha95-dev on Fiverr for password:");
        
        if (userPass !== PASSWORD) {
            document.body.innerHTML = `
                <div style="text-align:center;margin-top:100px;font-family:Arial">
                    <h1>🔒 Access Denied</h1>
                    <p>This demo is for authorized clients only.</p>
                    <p>📧 Contact <strong>taha95-dev</strong> on Fiverr</p>
                    <p style="color:#666;margin-top:50px">Professional graphing solutions available</p>
                </div>
            `;
            throw new Error("Unauthorized access");
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="converter-card">
            <h1>Currency Converter</h1>
            <p class="subtitle">Live exchange rates</p>

            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="amount" value="1" step="any">
            </div>

            <div class="currency-row">
                <div class="input-group">
                    <label>From</label>
                    <select id="fromCurrency">
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="CAD" selected>CAD - Canadian Dollar</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                        <option value="INR">INR - Indian Rupee</option>
                        <option value="PKR">PKR - Pakistani Rupee</option>
                    </select>
                </div>

                <div class="swap-icon" id="swapBtn">⇄</div>

                <div class="input-group">
                    <label>To</label>
                    <select id="toCurrency">
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR" selected>EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="CAD">CAD - Canadian Dollar</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                        <option value="INR">INR - Indian Rupee</option>
                        <option value="PKR">PKR - Pakistani Rupee</option>
                    </select>
                </div>
            </div>

            <button id="convertBtn">Convert</button>

            <div class="result" id="result">
                <!-- Result will appear here -->
            </div>

            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
